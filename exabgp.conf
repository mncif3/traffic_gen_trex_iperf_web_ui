# ExaBGP configuration for TRex Web UI
process bgp-control {
    run /usr/bin/python3 -u /opt/trex-web/exabgp_handler.py;
    encoder json;
}

template {
    neighbor peer {
        router-id 192.168.100.174;
        local-as 65000;
        local-address 192.168.100.174;
        hold-time 30;
        keepalive 10;
    }
}

neighbor 192.168.100.167 {
    inherit peer;
    peer-as 65001;
    api services {
        receive-routes;
    }
}

neighbor 127.0.0.1 {
    inherit peer;
    peer-as 65000;
    api services {
        receive-routes;
    }
}
